global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "runq-api"
    static_configs:
      - targets: ["host.docker.internal:9090"]

  - job_name: "runq-scheduler"
    static_configs:
      - targets: ["host.docker.internal:9091"]

  - job_name: "runq-reaper"
    static_configs:
      - targets: ["host.docker.internal:9092"]

  - job_name: "runq-worker"
    static_configs:
      - targets: ["host.docker.internal:9093"]
